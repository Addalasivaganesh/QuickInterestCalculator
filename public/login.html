<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <input id="phone" type="text" placeholder="Enter phone number">
    <button id="sendOtpBtn" onclick="sendOtp()">Send OTP</button>
    <input id="otp" type="text" placeholder="Enter OTP">
    <button id="verifyOtpBtn" onclick="verifyOtp()">Verify OTP</button>
  </div>
</body>
</html>
